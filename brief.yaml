# NexusPoint Systems — Brief for content generation
# Run: ensayo init --brief brief.yaml --output .

company:
  name: "NexusPoint Systems"
  slug: "nexuspoint-systems"
  tagline: "Connecting Business to What's Next"
  industry: "cloud_services"
  location: "Perth, Western Australia"

  profile:
    founded: 2016
    employees: 35
    revenue: "$6.2M annually"
    structure: "SME / Private"
    description: |
      A managed IT services and cloud solutions provider serving mid-market
      businesses across Western Australia. Specialises in cloud migration,
      cybersecurity, and managed infrastructure for organisations with
      50-500 employees. Known for proactive monitoring, fast response times,
      and translating complex technical decisions into business language.
    key_facts:
      - "120+ active managed service contracts"
      - "99.7% uptime SLA across client base"
      - "24/7 NOC with average 12-minute first response"
      - "Microsoft Gold Partner and AWS Select Partner"
      - "65% of revenue from recurring managed services"
      - "Growing cybersecurity practice (up 40% YoY)"
    services:
      - "Managed IT infrastructure and helpdesk"
      - "Cloud migration and hybrid cloud architecture"
      - "Cybersecurity assessments and managed detection"
      - "Business continuity and disaster recovery"
      - "Network design and implementation"
      - "IT strategy consulting for mid-market"

  scenario:
    type: "growth"
    name: "Security-First Pivot"
    description: |
      NexusPoint built its reputation on reliable managed IT services,
      but the market is shifting. Clients are demanding more sophisticated
      cybersecurity capabilities following several high-profile breaches
      in the WA mid-market. The company is investing heavily in building
      a dedicated security operations team, but this is straining existing
      staff who are already stretched across managed service commitments.
      Meanwhile, a major mining client has requested a proposal for a
      full security overhaul — the largest single contract NexusPoint
      has ever been offered.
    key_tensions:
      - "Managed services reliability vs. security practice investment"
      - "Hiring specialist security talent in a competitive Perth market"
      - "Client expectations outpacing team capability"
      - "Revenue concentration risk if mining contract dominates"
      - "Technical debt in internal tooling vs. client-facing work"

